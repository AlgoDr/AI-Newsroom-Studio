<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#fff;font-family:system-ui,sans-serif">
<title>Agent 5 — Script Writer architecture</title>
<desc>Six-function pipeline: get selected → tone instruction → build prompt → LLM call → enforce word count → parse script</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#333">Agent 5 — Script Writer</text>
<text x="340" y="46" text-anchor="middle" font-size="11" fill="#888">get selected → tone → prompt → LLM → word count → parse</text>

<!-- INPUT -->
<rect x="190" y="60" width="300" height="44" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="78" text-anchor="middle" font-size="12" font-weight="500" fill="#333">call4 — top 3 selected stories</text>
<text x="340" y="96" text-anchor="middle" font-size="10" fill="#666">selected=True · sorted by selection_rank</text>

<line x1="340" y1="104" x2="340" y2="124" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- STEP 1 -->
<rect x="130" y="124" width="420" height="64" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1"/>
<text x="340" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#1a3a6a">1 · _get_selected_stories()</text>
<text x="340" y="166" text-anchor="middle" font-size="11" fill="#2a4a7a">filter selected=True · sort by selection_rank · returns list[dict]</text>

<!-- STEP 2 -->
<line x1="340" y1="188" x2="340" y2="204" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="130" y="204" width="420" height="80" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1"/>
<text x="340" y="228" text-anchor="middle" font-size="13" font-weight="500" fill="#1a3a6a">2 · _tone_instruction(cred_score)</text>
<text x="340" y="248" text-anchor="middle" font-size="11" fill="#2a4a7a">cred &gt; 0.5  → "Write confidently, use specific numbers"</text>
<text x="340" y="266" text-anchor="middle" font-size="11" fill="#2a4a7a">cred &lt; 0.15 → "Reports suggest / Unconfirmed but..."</text>

<!-- STEP 3 -->
<line x1="340" y1="284" x2="340" y2="300" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="130" y="300" width="420" height="100" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1"/>
<text x="340" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#1a3a6a">3 · _build_prompt()</text>
<text x="340" y="344" text-anchor="middle" font-size="11" fill="#2a4a7a">all 3 stories in ONE prompt · word targets: rank1=75w rank2=60w rank3=45w</text>
<text x="340" y="362" text-anchor="middle" font-size="11" fill="#2a4a7a">labels: HOOK · S1_CONTEXT · S1_CORE · S1_TWIST · S2_HOOK · ... · CTA</text>
<text x="340" y="380" text-anchor="middle" font-size="10" fill="#888">background[:300] + content[:500] per story + tone instruction injected</text>

<!-- STEP 4: LLM -->
<line x1="340" y1="400" x2="340" y2="416" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="130" y="416" width="420" height="80" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1.5"/>
<text x="340" y="440" text-anchor="middle" font-size="13" font-weight="500" fill="#3333aa">llama-3.3-70b-versatile (Groq)</text>
<text x="340" y="460" text-anchor="middle" font-size="11" fill="#5555aa">separate quota from gpt-oss-120b (Agent 3)</text>
<text x="340" y="478" text-anchor="middle" font-size="11" fill="#5555aa">temperature=0.7 · max_tokens=500 · 1 call for all 3 stories</text>

<!-- STEP 5: word count -->
<line x1="340" y1="496" x2="340" y2="516" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="130" y="516" width="420" height="100" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="340" y="540" text-anchor="middle" font-size="13" font-weight="500" fill="#8a3a10">5 · _enforce_word_count()</text>
<text x="340" y="560" text-anchor="middle" font-size="11" fill="#a04820">150-225 words → pass · &gt;225 → trim call · &lt;150 → expand call</text>
<text x="340" y="578" text-anchor="middle" font-size="11" fill="#a04820">max 2 attempts · accepts as-is after attempt 2 with warning</text>
<text x="340" y="596" text-anchor="middle" font-size="10" fill="#888">Agent 6 (QC) is the authoritative validator · this is first-pass only</text>

<!-- STEP 6: parse -->
<line x1="340" y1="616" x2="340" y2="632" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="130" y="632" width="420" height="80" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1"/>
<text x="340" y="656" text-anchor="middle" font-size="13" font-weight="500" fill="#1a3a6a">6 · _parse_script()</text>
<text x="340" y="676" text-anchor="middle" font-size="11" fill="#2a4a7a">regex splits on known labels → dict of 10 sections</text>
<text x="340" y="694" text-anchor="middle" font-size="10" fill="#888">HOOK S1_CONTEXT S1_CORE S1_TWIST S2_HOOK S2_CORE S2_TWIST S3_HOOK S3_CORE CTA</text>

<!-- OUTPUT -->
<line x1="340" y1="712" x2="340" y2="732" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="110" y="732" width="460" height="68" rx="8" fill="#e0ffe0" stroke="#88dd88" stroke-width="1"/>
<text x="340" y="754" text-anchor="middle" font-size="12" font-weight="500" fill="#226622">state["script"] — first top-level key in NewsroomState</text>
<text x="340" y="772" text-anchor="middle" font-size="10" fill="#338833">full_text · word_count · est_duration · sections · stories_used · attempt</text>
<text x="340" y="790" text-anchor="middle" font-size="10" fill="#338833">not per-story — covers all 3 selected stories together</text>
</svg>
