<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:system-ui,sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- INPUT -->
<rect x="215" y="20" width="250" height="48" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Story from Agent 1</text>
<text x="340" y="57" text-anchor="middle" font-size="11" fill="#666">title + url + velocity</text>

<!-- STAGE 1 -->
<text x="30" y="90" font-size="11" fill="#aaa">Stage 1 — content fetch</text>
<line x1="30" y1="95" x2="650" y2="95" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="340" y1="68" x2="340" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="160" y1="110" x2="520" y2="110" stroke="#888" stroke-width="1.5"/>
<line x1="160" y1="110" x2="160" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="340" y1="110" x2="340" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="520" y1="110" x2="520" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="70" y="120" width="180" height="52" rx="8" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="160" y="141" text-anchor="middle" font-size="13" font-weight="600" fill="#2a6b5e">trafilatura</text>
<text x="160" y="158" text-anchor="middle" font-size="11" fill="#3a8070">Tier 1 — free, fast</text>

<rect x="250" y="120" width="180" height="52" rx="8" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="340" y="141" text-anchor="middle" font-size="13" font-weight="600" fill="#2a6b5e">Jina AI reader</text>
<text x="340" y="158" text-anchor="middle" font-size="11" fill="#3a8070">Tier 2 — free, JS sites</text>

<rect x="430" y="120" width="180" height="52" rx="8" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="520" y="141" text-anchor="middle" font-size="13" font-weight="600" fill="#2a6b5e">Tavily extract</text>
<text x="520" y="158" text-anchor="middle" font-size="11" fill="#3a8070">Tier 3 — paid, reliable</text>

<text x="80" y="196" font-size="10" fill="#aaa">junk? → next tier</text>
<line x1="160" y1="172" x2="280" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="340" y1="172" x2="340" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="520" y1="172" x2="400" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="175" y="210" width="330" height="52" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="231" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">looks_like_real_content()</text>
<text x="340" y="249" text-anchor="middle" font-size="11" fill="#5555aa">len, whitespace, junk markers, prose lines</text>

<line x1="340" y1="262" x2="340" y2="294" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="220" y="294" width="240" height="48" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#333">story["content"]</text>
<text x="340" y="330" text-anchor="middle" font-size="11" fill="#666">up to 6000 chars</text>

<!-- STAGE 2 -->
<text x="30" y="362" font-size="11" fill="#aaa">Stage 2 — background gather</text>
<line x1="30" y1="367" x2="650" y2="367" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="340" y1="342" x2="340" y2="380" stroke="#888" stroke-width="1.5"/>
<line x1="200" y1="380" x2="480" y2="380" stroke="#888" stroke-width="1.5"/>
<line x1="200" y1="380" x2="200" y2="390" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="480" y1="380" x2="480" y2="390" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="80" y="390" width="240" height="52" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="200" y="411" text-anchor="middle" font-size="13" font-weight="600" fill="#8a3a10">DDG news search</text>
<text x="200" y="428" text-anchor="middle" font-size="11" fill="#a04820">max 5 snippets, 2s sleep</text>

<rect x="360" y="390" width="240" height="52" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="480" y="411" text-anchor="middle" font-size="13" font-weight="600" fill="#8a3a10">Wikipedia summary</text>
<text x="480" y="428" text-anchor="middle" font-size="11" fill="#a04820">phi3.5 → keyword → 12 sentences</text>

<line x1="200" y1="442" x2="285" y2="474" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="480" y1="442" x2="395" y2="474" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="200" y="474" width="280" height="48" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="494" text-anchor="middle" font-size="13" font-weight="600" fill="#333">snippets list</text>
<text x="340" y="510" text-anchor="middle" font-size="11" fill="#666">DDG + Wikipedia combined</text>

<!-- STAGE 3 -->
<text x="30" y="542" font-size="11" fill="#aaa">Stage 3 — synthesis (intent-based routing)</text>
<line x1="30" y1="547" x2="650" y2="547" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="340" y1="522" x2="340" y2="558" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="175" y="558" width="330" height="52" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="578" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">synthesize_background()</text>
<text x="340" y="596" text-anchor="middle" font-size="11" fill="#5555aa">0 snippets + small → cloud  |  has snippets → 8B</text>

<text x="155" y="632" font-size="10" fill="#aaa">0 snippets</text>
<text x="450" y="632" font-size="10" fill="#aaa">has snippets</text>
<line x1="270" y1="610" x2="170" y2="652" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="410" y1="610" x2="510" y2="652" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- compound-mini -->
<rect x="30" y="652" width="280" height="68" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1.5"/>
<text x="170" y="674" text-anchor="middle" font-size="13" font-weight="600" fill="#1a3a6a">groq/compound-mini</text>
<text x="170" y="691" text-anchor="middle" font-size="11" fill="#2a4a7a">small boss — built-in web search</text>
<text x="170" y="707" text-anchor="middle" font-size="11" fill="#2a4a7a">single search per request</text>

<!-- local 8B -->
<rect x="370" y="652" width="280" height="68" rx="8" fill="#fdf0d0" stroke="#c8992a" stroke-width="1"/>
<text x="510" y="674" text-anchor="middle" font-size="13" font-weight="600" fill="#6a3a00">llama3.1:8b local</text>
<text x="510" y="691" text-anchor="middle" font-size="11" fill="#7a4a10">no size limit, keep_alive=0</text>
<text x="510" y="707" text-anchor="middle" font-size="11" fill="#7a4a10">no context bleed</text>

<!-- empty/fail label + arrow to big boss -->
<text x="170" y="735" text-anchor="middle" font-size="10" fill="#cc4444">empty / fail ↓</text>
<line x1="170" y1="742" x2="170" y2="760" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- big boss 120B -->
<rect x="30" y="760" width="280" height="72" rx="8" fill="#dceeff" stroke="#4477bb" stroke-width="2"/>
<text x="170" y="782" text-anchor="middle" font-size="13" font-weight="600" fill="#1a3a6a">gpt-oss-120b + web search</text>
<text x="170" y="799" text-anchor="middle" font-size="11" fill="#2a4a7a">big boss — Groq Responses API</text>
<text x="170" y="815" text-anchor="middle" font-size="10" fill="#cc4444">⚠ shares 200K daily quota with Agent 3</text>

<!-- ⚠ quota warning box -->
<rect x="30" y="840" width="280" height="30" rx="6" fill="#fff5e0" stroke="#e0aa44" stroke-width="1"/>
<text x="170" y="859" text-anchor="middle" font-size="10" fill="#885500">If quota hit → falls to llama3.1:8b</text>

<!-- big boss fail → 8B fallback arrow -->
<line x1="310" y1="800" x2="430" y2="800" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="370" y="792" font-size="10" fill="#cc4444">fail</text>

<!-- arrows both → clean -->
<line x1="510" y1="720" x2="430" y2="898" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="170" y1="870" x2="290" y2="898" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- _clean_synthesis -->
<rect x="175" y="898" width="330" height="48" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="918" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">_clean_synthesis()</text>
<text x="340" y="935" text-anchor="middle" font-size="11" fill="#5555aa">strip INSUFFICIENT DATA, len &gt; 100</text>

<line x1="340" y1="946" x2="340" y2="962" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- OUTPUT -->
<rect x="175" y="962" width="330" height="10" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="970" text-anchor="middle" font-size="11" fill="#666">story["background"] — 0–1200 chars or honest empty</text>
</svg>
