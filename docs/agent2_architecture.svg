<svg viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:system-ui,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- INPUT -->
<rect x="240" y="20" width="200" height="44" rx="10" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Story from Agent 1</text>
<text x="340" y="55" text-anchor="middle" font-size="11" fill="#666">title + url + velocity</text>

<!-- STAGE 1 LABEL -->
<text x="28" y="100" font-size="11" fill="#999">STAGE 1 — content fetch</text>
<line x1="28" y1="94" x2="652" y2="94" stroke="#ddd" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Arrow input to tiers -->
<line x1="340" y1="64" x2="340" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="110" x2="500" y2="110" stroke="#888" stroke-width="1.5"/>
<line x1="180" y1="110" x2="180" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="110" x2="340" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="110" x2="500" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TIER 1: trafilatura -->
<rect x="100" y="118" width="160" height="54" rx="10" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="180" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#2a6b5e">trafilatura</text>
<text x="180" y="157" text-anchor="middle" font-size="11" fill="#3a8070">Tier 1 — free, fast</text>

<!-- TIER 2: Jina -->
<rect x="260" y="118" width="160" height="54" rx="10" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="340" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#2a6b5e">Jina AI reader</text>
<text x="340" y="157" text-anchor="middle" font-size="11" fill="#3a8070">Tier 2 — free, JS sites</text>

<!-- TIER 3: Tavily -->
<rect x="420" y="118" width="160" height="54" rx="10" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="500" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#2a6b5e">Tavily extract</text>
<text x="420" y="157" text-anchor="middle" font-size="11" fill="#3a8070">Tier 3 — paid, reliable</text>

<!-- junk label -->
<text x="108" y="200" font-size="10" fill="#999">junk?→next tier</text>

<!-- Arrows tiers to gate -->
<line x1="180" y1="172" x2="285" y2="208" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="172" x2="340" y2="208" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="172" x2="395" y2="208" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gate: looks_like_real_content -->
<rect x="190" y="208" width="300" height="56" rx="10" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="231" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">looks_like_real_content()</text>
<text x="340" y="250" text-anchor="middle" font-size="11" fill="#5555aa">len, whitespace, junk markers, prose lines</text>

<!-- Arrow gate to content -->
<line x1="340" y1="264" x2="340" y2="296" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- story content -->
<rect x="240" y="296" width="200" height="44" rx="10" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="313" text-anchor="middle" font-size="13" font-weight="600" fill="#333">story["content"]</text>
<text x="340" y="330" text-anchor="middle" font-size="11" fill="#666">up to 6000 chars</text>

<!-- STAGE 2 LABEL -->
<text x="28" y="372" font-size="11" fill="#999">STAGE 2 — background gather</text>
<line x1="28" y1="366" x2="652" y2="366" stroke="#ddd" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Arrow content to stage 2 -->
<line x1="340" y1="340" x2="340" y2="380" stroke="#888" stroke-width="1.5"/>
<line x1="220" y1="380" x2="460" y2="380" stroke="#888" stroke-width="1.5"/>
<line x1="220" y1="380" x2="220" y2="388" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="460" y1="380" x2="460" y2="388" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- DDG search -->
<rect x="100" y="388" width="240" height="54" rx="10" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="220" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#8a3a10">DDG news search</text>
<text x="220" y="428" text-anchor="middle" font-size="11" fill="#a04820">max 5 snippets, 2s sleep</text>

<!-- Wikipedia -->
<rect x="360" y="388" width="220" height="54" rx="10" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="470" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#8a3a10">Wikipedia summary</text>
<text x="470" y="428" text-anchor="middle" font-size="11" fill="#a04820">phi3.5 → keyword → 12 sentences</text>

<!-- Arrows to snippets -->
<line x1="220" y1="442" x2="280" y2="474" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="470" y1="442" x2="400" y2="474" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Snippets -->
<rect x="200" y="474" width="280" height="44" rx="10" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="491" text-anchor="middle" font-size="13" font-weight="600" fill="#333">snippets list</text>
<text x="340" y="509" text-anchor="middle" font-size="11" fill="#666">DDG + Wikipedia combined</text>

<!-- STAGE 3 LABEL -->
<text x="28" y="546" font-size="11" fill="#999">STAGE 3 — synthesis</text>
<line x1="28" y1="540" x2="652" y2="540" stroke="#ddd" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Arrow snippets to router -->
<line x1="340" y1="518" x2="340" y2="556" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Router -->
<rect x="190" y="556" width="300" height="56" rx="10" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="579" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">synthesize_background()</text>
<text x="340" y="597" text-anchor="middle" font-size="11" fill="#5555aa">intent: has snippets? → route</text>

<!-- Route labels -->
<text x="210" y="638" font-size="10" fill="#999">0 snippets / small</text>
<text x="430" y="638" font-size="10" fill="#999">has snippets / large</text>

<!-- Arrow router to cloud -->
<line x1="285" y1="612" x2="190" y2="656" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Arrow router to local -->
<line x1="395" y1="612" x2="490" y2="656" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Cloud synthesis -->
<rect x="60" y="656" width="250" height="64" rx="10" fill="#dceeff" stroke="#88aadd" stroke-width="1"/>
<text x="185" y="678" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6a">_synthesize_grokapi_cloud()</text>
<text x="185" y="696" text-anchor="middle" font-size="11" fill="#2a4a7a">groq/compound, web search</text>
<text x="185" y="711" text-anchor="middle" font-size="11" fill="#2a4a7a">payload &lt; 4000 chars</text>

<!-- Local synthesis -->
<rect x="370" y="656" width="250" height="64" rx="10" fill="#fdf0d0" stroke="#d4aa60" stroke-width="1"/>
<text x="495" y="678" text-anchor="middle" font-size="12" font-weight="600" fill="#6a3a00">_synthesize_local()</text>
<text x="495" y="696" text-anchor="middle" font-size="11" fill="#7a4a10">llama3.1:8b, no size limit</text>
<text x="495" y="711" text-anchor="middle" font-size="11" fill="#7a4a10">keep_alive=0, no bleed</text>

<!-- Arrows to clean -->
<line x1="185" y1="720" x2="285" y2="756" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="495" y1="720" x2="395" y2="756" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Clean synthesis -->
<rect x="190" y="756" width="300" height="56" rx="10" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="779" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">_clean_synthesis()</text>
<text x="340" y="797" text-anchor="middle" font-size="11" fill="#5555aa">strip INSUFFICIENT DATA, len &gt; 100</text>

<!-- Arrow to output -->
<line x1="340" y1="812" x2="340" y2="848" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="215" y="848" width="250" height="52" rx="10" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="868" text-anchor="middle" font-size="13" font-weight="600" fill="#333">story["background"]</text>
<text x="340" y="887" text-anchor="middle" font-size="11" fill="#666">0–800 chars or empty (honest)</text>
</svg>
