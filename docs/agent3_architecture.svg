<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:system-ui,sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- INPUT -->
<rect x="165" y="20" width="350" height="48" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Story from Agent 2</text>
<text x="340" y="57" text-anchor="middle" font-size="11" fill="#666">title + url + content + background</text>

<!-- arrow to split -->
<line x1="340" y1="68" x2="340" y2="100" stroke="#888" stroke-width="1.5"/>
<line x1="150" y1="100" x2="530" y2="100" stroke="#888" stroke-width="1.5"/>
<line x1="150" y1="100" x2="150" y2="112" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="530" y1="100" x2="530" y2="112" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- PIECE 1 label -->
<text x="30" y="110" font-size="11" fill="#aaa">Piece 1 — domain score (25%)</text>

<!-- PIECE 2 label -->
<text x="390" y="110" font-size="11" fill="#aaa">Piece 2 — LLM check (75%)</text>

<!-- source_score box -->
<rect x="30" y="112" width="260" height="196" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="160" y="134" text-anchor="middle" font-size="13" font-weight="600" fill="#8a3a10">source_score(url)</text>
<text x="160" y="152" text-anchor="middle" font-size="10" fill="#a04820">urlparse → domain → SOURCE_TIERS lookup</text>

<line x1="45" y1="162" x2="275" y2="162" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="48" y="177" font-size="10" fill="#6a2a00">github.com, arxiv.org</text>
<text x="268" y="177" text-anchor="end" font-size="10" font-weight="600" fill="#2a6a2a">0.90</text>

<line x1="45" y1="184" x2="275" y2="184" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="48" y="199" font-size="10" fill="#6a2a00">nature.com, science.org</text>
<text x="268" y="199" text-anchor="end" font-size="10" font-weight="600" fill="#3a6a2a">0.85</text>

<line x1="45" y1="206" x2="275" y2="206" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="48" y="221" font-size="10" fill="#6a2a00">arstechnica, theverge, wired</text>
<text x="268" y="221" text-anchor="end" font-size="10" font-weight="600" fill="#4a6a2a">0.80</text>

<line x1="45" y1="228" x2="275" y2="228" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="48" y="243" font-size="10" fill="#6a2a00">reuters, apnews, bbc</text>
<text x="268" y="243" text-anchor="end" font-size="10" font-weight="600" fill="#5a6a2a">0.75</text>

<line x1="45" y1="250" x2="275" y2="250" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="48" y="265" font-size="10" fill="#6a2a00">unknown / blog (most HN)</text>
<text x="268" y="265" text-anchor="end" font-size="10" font-weight="600" fill="#888">0.50</text>

<text x="160" y="297" text-anchor="middle" font-size="10" font-style="italic" fill="#888">most HN traffic → 0.50</text>

<!-- llm_credibility_check box -->
<rect x="390" y="112" width="260" height="196" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1.5"/>
<text x="520" y="134" text-anchor="middle" font-size="13" font-weight="600" fill="#1a3a6a">llm_credibility_check()</text>
<text x="520" y="152" text-anchor="middle" font-size="11" fill="#2a4a7a">openai/gpt-oss-120b via Groq</text>

<!-- quota warning inside box -->
<rect x="400" y="158" width="240" height="24" rx="4" fill="#fff5e0" stroke="#e0aa44" stroke-width="0.8"/>
<text x="520" y="174" text-anchor="middle" font-size="10" fill="#885500">⚠ 200K daily tokens (shared w/ Agent 2)</text>

<line x1="400" y1="184" x2="635" y2="184" stroke="#6699cc" stroke-width="0.5" stroke-dasharray="3 2"/>

<!-- guards -->
<rect x="400" y="190" width="238" height="26" rx="4" fill="#fff5f5" stroke="#ffaaaa" stroke-width="0.8"/>
<text x="519" y="206" text-anchor="middle" font-size="10" fill="#aa3333">content &lt; 100 chars → 0.3 (empty guard)</text>

<rect x="400" y="222" width="238" height="26" rx="4" fill="#fffbee" stroke="#ddcc88" stroke-width="0.8"/>
<text x="519" y="238" text-anchor="middle" font-size="10" fill="#886600">content &lt; 500 chars → 0.5 (thin guard)</text>

<line x1="400" y1="254" x2="635" y2="254" stroke="#6699cc" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="403" y="269" font-size="10" fill="#1a3a6a">REAL    → 0.90</text>
<text x="403" y="283" font-size="10" fill="#1a3a6a">OPINION → 0.50</text>
<text x="403" y="297" font-size="10" fill="#1a3a6a">SPAM    → 0.20</text>
<text x="560" y="276" font-size="9" font-style="italic" fill="#6688aa">Groq fail → 0.5</text>

<!-- arrows to combine -->
<line x1="160" y1="308" x2="258" y2="372" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="520" y1="308" x2="422" y2="372" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="168" y="348" font-size="10" fill="#888">× 0.25</text>
<text x="458" y="348" font-size="10" fill="#888">× 0.75</text>

<!-- COMBINE -->
<rect x="180" y="372" width="320" height="52" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="393" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">check_credibility()</text>
<text x="340" y="411" text-anchor="middle" font-size="11" fill="#5555aa">score = round(src×0.25 + llm×0.75, 2)</text>

<!-- discard gate label -->
<text x="30" y="445" font-size="11" fill="#aaa">Piece 3 — discard gate</text>
<line x1="30" y1="450" x2="650" y2="450" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4 3"/>

<line x1="340" y1="424" x2="340" y2="462" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- threshold -->
<rect x="215" y="462" width="250" height="48" rx="8" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
<text x="340" y="482" text-anchor="middle" font-size="13" font-weight="600" fill="#444">MIN_CREDIBILITY = 0.4</text>
<text x="340" y="499" text-anchor="middle" font-size="11" fill="#666">score &lt; 0.4 → discard</text>

<line x1="340" y1="510" x2="340" y2="540" stroke="#888" stroke-width="1.5"/>
<line x1="140" y1="540" x2="540" y2="540" stroke="#888" stroke-width="1.5"/>
<line x1="140" y1="540" x2="140" y2="552" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="540" y1="540" x2="540" y2="552" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<text x="90" y="540" font-size="10" fill="#cc3333">score &lt; 0.4</text>
<text x="450" y="540" font-size="10" fill="#2a6a2a">score ≥ 0.4</text>

<!-- DISCARD -->
<rect x="30" y="552" width="220" height="68" rx="8" fill="#ffe0e0" stroke="#dd8888" stroke-width="1"/>
<text x="140" y="574" text-anchor="middle" font-size="13" font-weight="600" fill="#882222">discarded = True</text>
<text x="140" y="592" text-anchor="middle" font-size="10" fill="#aa3333">marked, NOT deleted</text>
<text x="140" y="608" text-anchor="middle" font-size="10" fill="#aa3333">audit trail preserved</text>

<!-- KEEP -->
<rect x="430" y="552" width="220" height="68" rx="8" fill="#e0ffe0" stroke="#88dd88" stroke-width="1"/>
<text x="540" y="574" text-anchor="middle" font-size="13" font-weight="600" fill="#226622">discarded = False</text>
<text x="540" y="592" text-anchor="middle" font-size="10" fill="#338833">passes to Agent 4</text>
<text x="540" y="608" text-anchor="middle" font-size="10" fill="#338833">(Editorial)</text>

<line x1="140" y1="620" x2="265" y2="664" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="540" y1="620" x2="415" y2="664" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- OUTPUT -->
<rect x="175" y="664" width="330" height="64" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="685" text-anchor="middle" font-size="13" font-weight="600" fill="#333">story enriched</text>
<text x="340" y="703" text-anchor="middle" font-size="11" fill="#666">+ credibility_score (0.0–1.0)</text>
<text x="340" y="718" text-anchor="middle" font-size="11" fill="#666">+ discarded (True / False)</text>

<!-- Example scores -->
<rect x="60" y="746" width="560" height="44" rx="6" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
<text x="340" y="762" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Example scores this run</text>
<text x="130" y="779" text-anchor="middle" font-size="10" fill="#226622">github + REAL → 0.90 ✅</text>
<text x="340" y="779" text-anchor="middle" font-size="10" fill="#886600">blog + OPINION → 0.50 ✅</text>
<text x="555" y="779" text-anchor="middle" font-size="10" fill="#882222">0-content → 0.35 🗑️</text>
</svg>
