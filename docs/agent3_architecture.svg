<svg viewBox="0 0 720 800" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:system-ui,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- INPUT -->
<rect x="210" y="20" width="300" height="50" rx="10" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="360" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Story from Agent 2</text>
<text x="360" y="58" text-anchor="middle" font-size="11" fill="#666">title + url + content + background</text>

<!-- Arrow to split -->
<line x1="360" y1="70" x2="360" y2="100" stroke="#888" stroke-width="1.5"/>
<line x1="160" y1="100" x2="560" y2="100" stroke="#888" stroke-width="1.5"/>
<line x1="160" y1="100" x2="160" y2="112" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="100" x2="560" y2="112" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PIECE 1 LABEL -->
<text x="28" y="108" font-size="11" fill="#999">PIECE 1 — domain score (25%)</text>

<!-- PIECE 2 LABEL -->
<text x="420" y="108" font-size="11" fill="#999">PIECE 2 — LLM check (75%)</text>

<!-- SOURCE TIERS box -->
<rect x="40" y="112" width="240" height="180" rx="10" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="160" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#8a3a10">source_score(url)</text>
<text x="160" y="152" text-anchor="middle" font-size="10" fill="#a04820">urlparse → domain → SOURCE_TIERS</text>

<!-- Tier lines inside box -->
<line x1="55" y1="162" x2="265" y2="162" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="55" y="176" font-size="10" fill="#6a2a00">github.com, arxiv.org</text>
<text x="255" y="176" text-anchor="end" font-size="10" font-weight="600" fill="#2a6a2a">0.90</text>

<line x1="55" y1="183" x2="265" y2="183" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="55" y="197" font-size="10" fill="#6a2a00">nature.com, science.org</text>
<text x="255" y="197" text-anchor="end" font-size="10" font-weight="600" fill="#2a6a2a">0.85</text>

<line x1="55" y1="204" x2="265" y2="204" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="55" y="218" font-size="10" fill="#6a2a00">arstechnica, theverge, wired</text>
<text x="255" y="218" text-anchor="end" font-size="10" font-weight="600" fill="#4a6a2a">0.80</text>

<line x1="55" y1="225" x2="265" y2="225" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="55" y="239" font-size="10" fill="#6a2a00">reuters, apnews, bbc</text>
<text x="255" y="239" text-anchor="end" font-size="10" font-weight="600" fill="#6a6a2a">0.75</text>

<line x1="55" y1="246" x2="265" y2="246" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="55" y="260" font-size="10" fill="#6a2a00">unknown / blog / default</text>
<text x="255" y="260" text-anchor="end" font-size="10" font-weight="600" fill="#888">0.50</text>

<text x="160" y="283" text-anchor="middle" font-size="10" font-style="italic" fill="#888">most HN traffic → 0.50</text>

<!-- LLM CHECK box -->
<rect x="420" y="112" width="260" height="180" rx="10" fill="#dceeff" stroke="#88aadd" stroke-width="1"/>
<text x="550" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6a">llm_credibility_check()</text>
<text x="550" y="152" text-anchor="middle" font-size="10" fill="#2a4a7a">Groq openai/gpt-oss-120b</text>

<line x1="435" y1="162" x2="665" y2="162" stroke="#88aadd" stroke-width="0.5" stroke-dasharray="3 2"/>

<!-- Guards -->
<rect x="435" y="168" width="230" height="28" rx="5" fill="#fff5f5" stroke="#ffaaaa" stroke-width="0.8"/>
<text x="550" y="181" text-anchor="middle" font-size="10" fill="#aa3333">content &lt; 100 chars → 0.3 (empty)</text>
<text x="550" y="193" text-anchor="middle" font-size="9" fill="#cc5555">can't verify — lean low</text>

<rect x="435" y="202" width="230" height="28" rx="5" fill="#fffbee" stroke="#ddcc88" stroke-width="0.8"/>
<text x="550" y="215" text-anchor="middle" font-size="10" fill="#886600">content &lt; 500 chars → 0.5 (thin)</text>
<text x="550" y="227" text-anchor="middle" font-size="9" fill="#aa8800">too little to judge reliably</text>

<!-- REAL/OPINION/SPAM labels -->
<line x1="435" y1="237" x2="665" y2="237" stroke="#88aadd" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="435" y="252" font-size="10" fill="#1a3a6a">REAL     → 0.90</text>
<text x="435" y="267" font-size="10" fill="#1a3a6a">OPINION → 0.50</text>
<text x="435" y="282" font-size="10" fill="#1a3a6a">SPAM    → 0.20</text>
<text x="550" y="267" font-size="9" font-style="italic" fill="#6688aa">Groq fail → 0.5 neutral</text>

<!-- Arrows from pieces to combine -->
<line x1="160" y1="292" x2="260" y2="370" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="550" y1="292" x2="460" y2="370" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Weight labels -->
<text x="180" y="345" font-size="10" fill="#888">× 0.25</text>
<text x="485" y="345" font-size="10" fill="#888">× 0.75</text>

<!-- COMBINE box -->
<rect x="200" y="370" width="320" height="60" rx="10" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="360" y="393" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">check_credibility()</text>
<text x="360" y="412" text-anchor="middle" font-size="11" fill="#5555aa">score = round(src×0.25 + llm×0.75, 2)</text>

<!-- STAGE DIVIDER -->
<line x1="28" y1="450" x2="692" y2="450" stroke="#ddd" stroke-width="1" stroke-dasharray="4 3"/>
<text x="28" y="444" font-size="11" fill="#999">PIECE 3 — discard gate</text>

<!-- Arrow combine to gate -->
<line x1="360" y1="430" x2="360" y2="462" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- THRESHOLD box -->
<rect x="230" y="462" width="260" height="50" rx="10" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
<text x="360" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#444">MIN_CREDIBILITY = 0.4</text>
<text x="360" y="500" text-anchor="middle" font-size="11" fill="#666">score &lt; 0.4 → discard</text>

<!-- Arrow to branch -->
<line x1="360" y1="512" x2="360" y2="542" stroke="#888" stroke-width="1.5"/>
<line x1="160" y1="542" x2="560" y2="542" stroke="#888" stroke-width="1.5"/>
<line x1="160" y1="542" x2="160" y2="554" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="542" x2="560" y2="554" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Branch labels -->
<text x="100" y="542" font-size="10" fill="#cc3333">score &lt; 0.4</text>
<text x="460" y="542" font-size="10" fill="#2a6a2a">score ≥ 0.4</text>

<!-- DISCARD box -->
<rect x="50" y="554" width="220" height="64" rx="10" fill="#ffe0e0" stroke="#dd8888" stroke-width="1"/>
<text x="160" y="576" text-anchor="middle" font-size="12" font-weight="600" fill="#882222">discarded = True</text>
<text x="160" y="594" text-anchor="middle" font-size="10" fill="#aa3333">marked, NOT deleted</text>
<text x="160" y="610" text-anchor="middle" font-size="10" fill="#aa3333">audit trail preserved</text>

<!-- KEEP box -->
<rect x="450" y="554" width="220" height="64" rx="10" fill="#e0ffe0" stroke="#88dd88" stroke-width="1"/>
<text x="560" y="576" text-anchor="middle" font-size="12" font-weight="600" fill="#226622">discarded = False</text>
<text x="560" y="594" text-anchor="middle" font-size="10" fill="#338833">passes to Agent 4</text>
<text x="560" y="610" text-anchor="middle" font-size="10" fill="#338833">(Editorial)</text>

<!-- Arrows both to output -->
<line x1="160" y1="618" x2="280" y2="664" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="618" x2="440" y2="664" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OUTPUT -->
<rect x="200" y="664" width="320" height="56" rx="10" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="360" y="686" text-anchor="middle" font-size="13" font-weight="600" fill="#333">story enriched</text>
<text x="360" y="704" text-anchor="middle" font-size="11" fill="#666">+ credibility_score (0.0–1.0)</text>
<text x="360" y="718" text-anchor="middle" font-size="11" fill="#666">+ discarded (True/False)</text>

<!-- Example scores -->
<rect x="100" y="738" width="500" height="44" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
<text x="350" y="756" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Example scores</text>
<text x="145" y="772" text-anchor="middle" font-size="10" fill="#226622">github + REAL → 0.90 ✅</text>
<text x="350" y="772" text-anchor="middle" font-size="10" fill="#886600">blog + OPINION → 0.50 ✅</text>
<text x="555" y="772" text-anchor="middle" font-size="10" fill="#882222">0-content → 0.35 🗑️</text>
</svg>
