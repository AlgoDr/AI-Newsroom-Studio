<svg width="100%" viewBox="0 0 720 900" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:system-ui,sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text x="360" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Agent 3 — Fact Checker (v2)</text>
<text x="360" y="46" text-anchor="middle" font-size="11" fill="#888">3-signal credibility scoring · -1.0 to +1.0 range · zero = discard boundary</text>

<!-- INPUT -->
<rect x="210" y="60" width="300" height="44" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="360" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Story from Agent 2</text>
<text x="360" y="95" text-anchor="middle" font-size="11" fill="#666">title + url + content + background</text>

<!-- arrow to split -->
<line x1="360" y1="104" x2="360" y2="124" stroke="#888" stroke-width="1.5"/>
<line x1="140" y1="124" x2="580" y2="124" stroke="#888" stroke-width="1.5"/>
<line x1="140" y1="124" x2="140" y2="136" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="360" y1="124" x2="360" y2="136" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="580" y1="124" x2="580" y2="136" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- weight labels -->
<text x="140" y="132" text-anchor="middle" font-size="10" fill="#888">×0.20</text>
<text x="360" y="132" text-anchor="middle" font-size="10" fill="#888">×0.60 / 0.50 / 0.30</text>
<text x="580" y="132" text-anchor="middle" font-size="10" fill="#888">×0.20 / 0.30 / 0.50</text>

<!-- SIGNAL 1: source_score -->
<rect x="50" y="136" width="180" height="130" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="140" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#8a3a10">source_score(url)</text>
<text x="140" y="175" text-anchor="middle" font-size="10" fill="#a04820">35-domain trust map</text>
<line x1="60" y1="182" x2="220" y2="182" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="60" y="196" font-size="10" fill="#6a2a00">github.com, arxiv.org</text><text x="218" y="196" text-anchor="end" font-size="10" font-weight="600" fill="#2a6a2a">+0.95</text>
<line x1="60" y1="203" x2="220" y2="203" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="60" y="216" font-size="10" fill="#6a2a00">arstechnica, wired</text><text x="218" y="216" text-anchor="end" font-size="10" font-weight="600" fill="#3a6a2a">+0.85</text>
<line x1="60" y1="223" x2="220" y2="223" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="60" y="236" font-size="10" fill="#6a2a00">reuters, bbc, bloomberg</text><text x="218" y="236" text-anchor="end" font-size="10" font-weight="600" fill="#6a6a2a">+0.75</text>
<line x1="60" y1="243" x2="220" y2="243" stroke="#e0a882" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="60" y="256" font-size="10" fill="#888">unknown / blog</text><text x="218" y="256" text-anchor="end" font-size="10" font-weight="600" fill="#888">0.0</text>

<!-- SIGNAL 2: llm_credibility -->
<rect x="270" y="136" width="180" height="180" rx="8" fill="#dceeff" stroke="#6699cc" stroke-width="1.5"/>
<text x="360" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6a">llm_credibility_check()</text>
<text x="360" y="174" text-anchor="middle" font-size="10" fill="#2a4a7a">gpt-oss-120b (200K/day pool)</text>
<line x1="280" y1="182" x2="440" y2="182" stroke="#6699cc" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- guards -->
<rect x="280" y="186" width="150" height="24" rx="4" fill="#fff5f5" stroke="#ffaaaa" stroke-width="0.8"/>
<text x="355" y="202" text-anchor="middle" font-size="10" fill="#aa3333">len &lt; 100 → 0.0 (empty)</text>
<rect x="280" y="214" width="150" height="24" rx="4" fill="#fffbee" stroke="#ddcc88" stroke-width="0.8"/>
<text x="355" y="230" text-anchor="middle" font-size="10" fill="#886600">len &lt; 500 → 0.0 (thin)</text>
<line x1="280" y1="242" x2="440" y2="242" stroke="#6699cc" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="284" y="258" font-size="10" fill="#1a3a6a">REAL    → +0.9</text>
<text x="284" y="273" font-size="10" fill="#1a3a6a">OPINION → +0.1</text>
<text x="284" y="288" font-size="10" fill="#cc2222">SPAM    → -0.7</text>
<text x="360" y="305" text-anchor="middle" font-size="9" font-style="italic" fill="#6688aa">fail/empty → 0.0</text>

<!-- SIGNAL 3: cross_verify -->
<rect x="490" y="136" width="180" height="230" rx="8" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="580" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#2a6b5e">cross_verify()</text>
<text x="580" y="174" text-anchor="middle" font-size="10" fill="#3a8070">Exa → DDG → neutral</text>
<line x1="500" y1="182" x2="660" y2="182" stroke="#88c4b8" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- Exa -->
<rect x="500" y="188" width="160" height="28" rx="4" fill="#fff" stroke="#88c4b8" stroke-width="0.8"/>
<text x="580" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#2a6b5e">Exa.search() type=neural</text>
<text x="580" y="212" text-anchor="middle" font-size="9" fill="#3a8070">semantic, HN-aware</text>
<!-- DDG -->
<text x="580" y="230" text-anchor="middle" font-size="9" fill="#888">fails → DDG fallback</text>
<rect x="500" y="234" width="160" height="28" rx="4" fill="#fff" stroke="#88c4b8" stroke-width="0.8"/>
<text x="580" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#2a6b5e">DDG.news() time.sleep(3)</text>
<text x="580" y="258" text-anchor="middle" font-size="9" fill="#3a8070">keyword, free, real-time</text>
<!-- trust filter -->
<text x="580" y="276" text-anchor="middle" font-size="9" fill="#888">trust ≥ 0.70 only</text>
<line x1="500" y1="282" x2="660" y2="282" stroke="#88c4b8" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- contradiction check -->
<rect x="500" y="286" width="160" height="36" rx="4" fill="#fff" stroke="#88c4b8" stroke-width="0.8"/>
<text x="580" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#2a6b5e">_check_contradiction()</text>
<text x="580" y="311" text-anchor="middle" font-size="9" fill="#3a8070">compound-mini · time.sleep(2)</text>
<!-- verify scores -->
<line x1="500" y1="328" x2="660" y2="328" stroke="#88c4b8" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="504" y="342" font-size="10" fill="#2a6b5e">confirmed   → +0.8</text>
<text x="504" y="357" font-size="10" fill="#888">not found   →  0.0</text>
<text x="504" y="372" font-size="10" fill="#cc2222">contradicted → -0.6</text>

<!-- arrows to reweighting -->
<line x1="140" y1="266" x2="250" y2="398" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="360" y1="316" x2="360" y2="398" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="580" y1="366" x2="470" y2="398" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- DYNAMIC REWEIGHTING -->
<rect x="170" y="398" width="380" height="90" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="360" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">dynamic reweighting</text>
<text x="360" y="440" text-anchor="middle" font-size="11" fill="#5555aa">contradiction → w_llm=0.30, w_verify=0.50</text>
<text x="360" y="457" text-anchor="middle" font-size="11" fill="#5555aa">confirmation  → w_llm=0.50, w_verify=0.30</text>
<text x="360" y="474" text-anchor="middle" font-size="11" fill="#5555aa">neutral       → w_llm=0.60, w_verify=0.20</text>

<!-- arrow to score -->
<line x1="360" y1="488" x2="360" y2="516" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- SCORE FORMULA -->
<rect x="170" y="516" width="380" height="52" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="360" y="537" text-anchor="middle" font-size="13" font-weight="600" fill="#3333aa">check_credibility()</text>
<text x="360" y="556" text-anchor="middle" font-size="11" fill="#5555aa">score = round(src×w + llm×w + verify×w, 2)</text>

<!-- arrow to threshold -->
<line x1="360" y1="568" x2="360" y2="596" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- THRESHOLD -->
<rect x="230" y="596" width="260" height="48" rx="8" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
<text x="360" y="616" text-anchor="middle" font-size="13" font-weight="600" fill="#444">MIN_CREDIBILITY = 0.0</text>
<text x="360" y="634" text-anchor="middle" font-size="11" fill="#666">negative = discard · zero = natural boundary</text>

<!-- branch -->
<line x1="230" y1="620" x2="130" y2="662" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="490" y1="620" x2="590" y2="662" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="155" y="652" font-size="10" fill="#cc3333">score &lt; 0.0</text>
<text x="490" y="652" font-size="10" fill="#2a6a2a">score ≥ 0.0</text>

<!-- DISCARD -->
<rect x="40" y="662" width="180" height="56" rx="8" fill="#ffe0e0" stroke="#dd8888" stroke-width="1"/>
<text x="130" y="683" text-anchor="middle" font-size="12" font-weight="600" fill="#882222">discarded = True</text>
<text x="130" y="700" text-anchor="middle" font-size="10" fill="#aa3333">marked, not deleted</text>

<!-- KEEP -->
<rect x="500" y="662" width="180" height="56" rx="8" fill="#e0ffe0" stroke="#88dd88" stroke-width="1"/>
<text x="590" y="683" text-anchor="middle" font-size="12" font-weight="600" fill="#226622">discarded = False</text>
<text x="590" y="700" text-anchor="middle" font-size="10" fill="#338833">passes to Agent 4</text>

<!-- OUTPUT FIELDS -->
<line x1="130" y1="718" x2="260" y2="752" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="590" y1="718" x2="460" y2="752" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="160" y="752" width="400" height="76" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="360" y="772" text-anchor="middle" font-size="12" font-weight="600" fill="#333">story enriched (6 new fields)</text>
<text x="360" y="790" text-anchor="middle" font-size="10" fill="#555">credibility_score · discarded · verified_by</text>
<text x="360" y="807" text-anchor="middle" font-size="10" fill="#555">contradicted · _cred_regime · _weights_used</text>

<!-- QUOTA NOTE -->
<rect x="60" y="848" width="600" height="36" rx="6" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
<text x="360" y="862" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Quota isolation — 3 separate Groq pools</text>
<text x="360" y="877" text-anchor="middle" font-size="10" fill="#666">gpt-oss-120b (credibility) · gpt-oss-20b (Agent 2) · compound-mini (contradiction check)</text>
</svg>
