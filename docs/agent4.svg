<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#fff;font-family:system-ui,sans-serif">
<title>Agent 4 — Editorial Agent architecture</title>
<desc>Four-function pipeline: filter → score → deduplicate → select, with LangGraph conditional edge routing to Agent 5 or end</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#333">Agent 4 — Editorial</text>
<text x="340" y="46" text-anchor="middle" font-size="11" fill="#888">filter → score → deduplicate → select → route</text>

<!-- INPUT -->
<rect x="190" y="60" width="300" height="44" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="78" text-anchor="middle" font-size="12" font-weight="500" fill="#333">call4 stories from Agent 3</text>
<text x="340" y="96" text-anchor="middle" font-size="10" fill="#666">8 stories · all 14 fields populated</text>

<line x1="340" y1="104" x2="340" y2="124" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- STEP 1: filter -->
<rect x="130" y="124" width="420" height="80" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="340" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#8a3a10">1 · filter_stories()</text>
<text x="340" y="167" text-anchor="middle" font-size="11" fill="#a04820">remove discarded=True stories (credibility_score &lt; 0.0)</text>
<text x="340" y="184" text-anchor="middle" font-size="10" fill="#888">pure python · no model · no API call</text>

<line x1="340" y1="204" x2="340" y2="224" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- STEP 2: score -->
<rect x="130" y="224" width="420" height="100" rx="8" fill="#e0dfff" stroke="#9090e0" stroke-width="1"/>
<text x="340" y="248" text-anchor="middle" font-size="13" font-weight="500" fill="#3333aa">2 · score_editorially()</text>
<text x="340" y="268" text-anchor="middle" font-size="11" fill="#5555aa">editorial_score = cred×0.50 + vel_norm×0.30 + bg_norm×0.20</text>
<text x="340" y="286" text-anchor="middle" font-size="11" fill="#5555aa">vel_norm = vel / max_vel_in_batch · bg_norm = min(bg/800, 1.0)</text>
<text x="340" y="304" text-anchor="middle" font-size="10" fill="#888">addition not multiplication · pure math · no model</text>

<line x1="340" y1="324" x2="340" y2="344" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- STEP 3: deduplicate -->
<rect x="130" y="344" width="420" height="120" rx="8" fill="#d4ede8" stroke="#88c4b8" stroke-width="1"/>
<text x="340" y="368" text-anchor="middle" font-size="13" font-weight="500" fill="#2a6b5e">3 · deduplicate_topics()</text>
<text x="340" y="388" text-anchor="middle" font-size="11" fill="#3a8070">phi3.5 (local) — ONE call for all 8 titles</text>
<text x="340" y="406" text-anchor="middle" font-size="11" fill="#3a8070">returns topic clusters → keep highest editorial_score per cluster</text>
<text x="340" y="424" text-anchor="middle" font-size="10" fill="#888">2-layer JSON cleaning · safe fallback if phi3.5 fails</text>
<text x="340" y="441" text-anchor="middle" font-size="10" fill="#888">one call = no context bleed · marks _is_duplicate=True on losers</text>

<line x1="340" y1="464" x2="340" y2="484" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- STEP 4: select -->
<rect x="130" y="484" width="420" height="100" rx="8" fill="#fce8d8" stroke="#e0a882" stroke-width="1"/>
<text x="340" y="508" text-anchor="middle" font-size="13" font-weight="500" fill="#8a3a10">4 · select_top_stories()</text>
<text x="340" y="528" text-anchor="middle" font-size="11" fill="#a04820">pool = eligible AND not duplicate · sort by editorial_score</text>
<text x="340" y="546" text-anchor="middle" font-size="11" fill="#a04820">take top 3 (or fewer) · set selected, selection_rank, selection_reason</text>
<text x="340" y="564" text-anchor="middle" font-size="10" fill="#888">0 selected → macOS Basso notification · pure python · no model</text>

<line x1="340" y1="584" x2="340" y2="614" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- LANGGRAPH EDGE -->
<rect x="190" y="614" width="300" height="44" rx="8" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
<text x="340" y="632" text-anchor="middle" font-size="12" font-weight="500" fill="#444">route_after_editorial()</text>
<text x="340" y="650" text-anchor="middle" font-size="10" fill="#666">first conditional edge in the pipeline</text>

<!-- branch lines -->
<line x1="270" y1="658" x2="160" y2="700" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="410" y1="658" x2="520" y2="700" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="195" y="692" text-anchor="middle" font-size="10" fill="#aa3333">0 stories</text>
<text x="485" y="692" text-anchor="middle" font-size="10" fill="#2a6a2a">≥1 story</text>

<!-- END -->
<rect x="60" y="700" width="180" height="56" rx="8" fill="#ffe0e0" stroke="#dd8888" stroke-width="1"/>
<text x="150" y="722" text-anchor="middle" font-size="12" font-weight="500" fill="#882222">end</text>
<text x="150" y="740" text-anchor="middle" font-size="10" fill="#aa3333">macOS notification fired</text>

<!-- AGENT 5 -->
<rect x="440" y="700" width="180" height="56" rx="8" fill="#e0ffe0" stroke="#88dd88" stroke-width="1"/>
<text x="530" y="722" text-anchor="middle" font-size="12" font-weight="500" fill="#226622">script_writer</text>
<text x="530" y="740" text-anchor="middle" font-size="10" fill="#338833">Agent 5 receives state</text>

<!-- OUTPUT FIELDS -->
<line x1="150" y1="756" x2="200" y2="786" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="530" y1="756" x2="480" y2="786" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="110" y="786" width="460" height="56" rx="8" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
<text x="340" y="808" text-anchor="middle" font-size="12" font-weight="500" fill="#333">fields added to each story</text>
<text x="340" y="826" text-anchor="middle" font-size="10" fill="#555">editorial_score · selected · selection_rank · selection_reason</text>
<text x="340" y="840" text-anchor="middle" font-size="10" fill="#555">_vel_norm · _bg_norm · _topic_cluster · _is_duplicate</text>
</svg>
